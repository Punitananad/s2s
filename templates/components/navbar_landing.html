{% load static %}
<header class="header">
  <nav class="navbar container">

    <!-- Logo -->
    <div class="order-0">
      <a href="{% url 'home' %}">
        <span style="font-size:1.4rem;font-weight:700;color:#4f46e5;letter-spacing:-0.5px;">
          Scan2Service
        </span>
      </a>
    </div>

    <!-- Mobile menu toggle -->
    <input id="nav-toggle" type="checkbox" class="hidden" />
    <label id="show-button" for="nav-toggle"
      class="order-1 flex cursor-pointer items-center lg:order-1 lg:hidden">
      <svg class="h-6 fill-current" viewBox="0 0 20 20">
        <title>Menu Open</title>
        <path d="M0 3h20v2H0V3z m0 6h20v2H0V9z m0 6h20v2H0V15z"></path>
      </svg>
    </label>
    <label id="hide-button" for="nav-toggle"
      class="order-2 hidden cursor-pointer items-center lg:order-1">
      <svg class="h-6 fill-current" viewBox="0 0 20 20">
        <title>Menu Close</title>
        <polygon points="11 9 22 9 22 11 11 11 11 22 9 22 9 11 -2 11 -2 9 9 9 9 -2 11 -2"
          transform="rotate(45 10 10)"></polygon>
      </svg>
    </label>

    <!-- Nav links -->
    <ul id="nav-menu"
      class="navbar-nav order-2 hidden w-full flex-[0_0_100%] lg:order-1 lg:flex lg:w-auto lg:flex-auto lg:justify-center lg:space-x-5">
      <li class="nav-item">
        <a href="{% url 'home' %}" class="nav-link">Home</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'about' %}" class="nav-link">About</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'pricing' %}" class="nav-link">Pricing</a>
      </li>
      <li class="nav-item">
        <a href="{% url 'contact' %}" class="nav-link">Contact</a>
      </li>

      <!-- Mobile-only auth links -->
      <li class="nav-item mt-3.5 lg:hidden">
        {% if user.is_authenticated %}
          <a class="btn btn-white btn-sm border-border" href="{% url 'portal_home' %}">Dashboard</a>
        {% else %}
          <a class="btn btn-white btn-sm border-border" href="{% url 'login' %}">Sign In</a>
        {% endif %}
      </li>
    </ul>

    <!-- Desktop CTA -->
    <div class="order-1 ml-auto hidden items-center md:order-2 md:ml-0 lg:flex">
      {% if user.is_authenticated %}
        <a class="btn btn-white btn-sm mr-3" href="{% url 'portal_home' %}">Dashboard</a>
        <a class="btn btn-primary btn-sm" href="{% url 'logout' %}">Sign Out</a>
      {% else %}
        <a class="btn btn-white btn-sm mr-3" href="{% url 'login' %}">Sign In</a>
        <a class="btn btn-primary btn-sm" href="{% url 'signup' %}">Get Started Free</a>
      {% endif %}
    </div>

  </nav>
</header>
