{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>{% block title %}Scan2Service{% endblock %}</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Swiper CSS (for auth carousel) -->
  <link rel="stylesheet" href="{% static 'vendor/swiper/swiper-bundle.css' %}" />

  <!-- Pinwheel Theme CSS -->
  <link rel="stylesheet" href="{% static 'css/pinwheel.css' %}" />

  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  <!-- Swiper JS -->
  <script src="{% static 'vendor/swiper/swiper-bundle.js' %}"></script>

  <!-- Pinwheel Theme JS -->
  <script src="{% static 'js/pinwheel.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
