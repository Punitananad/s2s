{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>{% block title %}Scan2Service — Hotel Service Management{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Turn any hotel room into a smart ordering experience. Guests scan, staff manage, everyone wins.{% endblock %}" />

  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="{% static 'vendor/swiper/swiper-bundle.css' %}" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'vendor/font-awesome/v6/fontawesome.css' %}" />
  <link rel="stylesheet" href="{% static 'vendor/font-awesome/v6/solid.css' %}" />
  <link rel="stylesheet" href="{% static 'vendor/font-awesome/v6/brands.css' %}" />

  <!-- Pinwheel Theme CSS -->
  <link rel="stylesheet" href="{% static 'css/pinwheel.css' %}" />

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  {% include "components/navbar_landing.html" %}
  <!-- ==================== /HEADER ==================== -->

  <!-- ==================== PAGE CONTENT ==================== -->
  {% block content %}{% endblock %}
  <!-- ==================== /PAGE CONTENT ==================== -->

  <!-- ==================== FOOTER ==================== -->
  {% include "components/footer_landing.html" %}
  <!-- ==================== /FOOTER ==================== -->

  <!-- Swiper JS -->
  <script src="{% static 'vendor/swiper/swiper-bundle.js' %}"></script>

  <!-- Pinwheel Theme JS -->
  <script src="{% static 'js/pinwheel.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
